databases:
  - name: aeroazteca-db
    databaseName: aeroazteca
    user: aeroadmin
    plan: free

services:
  - type: web
    name: aeroazteca-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: aeroazteca-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: aeroazteca-db
    databaseName: aeroazteca
    user: aeroadmin
    plan: free

services:
  - type: web
    name: aeroazteca-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && node dist/seed.js && npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: aeroazteca-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_PUBLISHABLE_KEY
        value: pk_test_51TJ3dHRqnLYmNCfKB61EocDfid0InuKt8NbxrxZ0H7l4wze7aYoUKqhM1FJE4sBir2YPFJ7uuFmKfzKPhPFK8sax00oe21y3DI
      - key: STRIPE_SUCCESS_URL
        value: http://aeroazteca.surge.sh/payment/success
      - key: STRIPE_CANCEL_URL
        value: http://aeroazteca.surge.sh/payment/cancel
